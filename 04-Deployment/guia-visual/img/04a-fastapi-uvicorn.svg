<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
    <marker id="arrowD" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="720" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">FastAPI y Uvicorn: que son y como trabajan juntos</text>
  <text x="450" y="64" text-anchor="middle" font-size="14" fill="#64748b">Las dos piezas fundamentales para crear una API en Python</text>

  <!-- ============================================ -->
  <!-- TOP ANALOGY BAR -->
  <!-- ============================================ -->
  <rect x="60" y="80" width="780" height="48" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="450" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Analogia: Piensa en un restaurante</text>
  <text x="450" y="118" text-anchor="middle" font-size="12" fill="#78350f">FastAPI es el chef (prepara la comida) — Uvicorn es el mesero (recibe pedidos y entrega platos)</text>

  <!-- ============================================ -->
  <!-- MAIN DIAGRAM: Request flow -->
  <!-- ============================================ -->

  <!-- Internet / Client -->
  <rect x="40" y="155" width="140" height="120" rx="12" fill="#ffffff" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="190" text-anchor="middle" font-size="36">🌍</text>
  <text x="110" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Internet</text>
  <text x="110" y="234" text-anchor="middle" font-size="10" fill="#64748b">Navegador, app,</text>
  <text x="110" y="248" text-anchor="middle" font-size="10" fill="#64748b">Postman, curl...</text>
  <text x="110" y="268" text-anchor="middle" font-size="9" fill="#6366F1">Envia peticiones HTTP</text>

  <!-- Arrow -->
  <line x1="185" y1="215" x2="228" y2="215" stroke="#475569" stroke-width="2" marker-end="url(#arrowD)"/>
  <text x="207" y="207" text-anchor="middle" font-size="8" fill="#64748b">HTTP</text>

  <!-- UVICORN BOX -->
  <rect x="235" y="148" width="210" height="200" rx="14" fill="#ffffff" stroke="#059669" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="235" y="148" width="210" height="40" rx="14" fill="#059669"/>
  <rect x="235" y="174" width="210" height="14" fill="#059669"/>
  <text x="340" y="174" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Uvicorn</text>

  <text x="340" y="212" text-anchor="middle" font-size="28">🍽️</text>
  <text x="340" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">El mesero / servidor</text>

  <rect x="252" y="250" width="176" height="22" rx="5" fill="#ecfdf5"/>
  <text x="340" y="266" text-anchor="middle" font-size="10" fill="#065f46">Escucha en un puerto (8000)</text>
  <rect x="252" y="276" width="176" height="22" rx="5" fill="#ecfdf5"/>
  <text x="340" y="292" text-anchor="middle" font-size="10" fill="#065f46">Recibe peticiones HTTP</text>
  <rect x="252" y="302" width="176" height="22" rx="5" fill="#ecfdf5"/>
  <text x="340" y="318" text-anchor="middle" font-size="10" fill="#065f46">Las pasa a FastAPI</text>
  <rect x="252" y="328" width="176" height="22" rx="5" fill="#ecfdf5"/>
  <text x="340" y="344" text-anchor="middle" font-size="10" fill="#065f46">Devuelve la respuesta</text>

  <!-- Arrow -->
  <line x1="450" y1="215" x2="493" y2="215" stroke="#475569" stroke-width="2" marker-end="url(#arrowD)"/>
  <text x="472" y="207" text-anchor="middle" font-size="8" fill="#64748b">pasa datos</text>

  <!-- FASTAPI BOX -->
  <rect x="500" y="148" width="210" height="200" rx="14" fill="#ffffff" stroke="#0891b2" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="500" y="148" width="210" height="40" rx="14" fill="#0891b2"/>
  <rect x="500" y="174" width="210" height="14" fill="#0891b2"/>
  <text x="605" y="174" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">FastAPI</text>

  <text x="605" y="212" text-anchor="middle" font-size="28">👨‍🍳</text>
  <text x="605" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#0891b2">El chef / framework</text>

  <rect x="517" y="250" width="176" height="22" rx="5" fill="#ecfeff"/>
  <text x="605" y="266" text-anchor="middle" font-size="10" fill="#155e75">Define las rutas (/predict)</text>
  <rect x="517" y="276" width="176" height="22" rx="5" fill="#ecfeff"/>
  <text x="605" y="292" text-anchor="middle" font-size="10" fill="#155e75">Valida datos (Pydantic)</text>
  <rect x="517" y="302" width="176" height="22" rx="5" fill="#ecfeff"/>
  <text x="605" y="318" text-anchor="middle" font-size="10" fill="#155e75">Ejecuta tu logica (modelo ML)</text>
  <rect x="517" y="328" width="176" height="22" rx="5" fill="#ecfeff"/>
  <text x="605" y="344" text-anchor="middle" font-size="10" fill="#155e75">Genera docs automaticas</text>

  <!-- Arrow to model -->
  <line x1="715" y1="215" x2="748" y2="215" stroke="#475569" stroke-width="2" marker-end="url(#arrowD)"/>

  <!-- MODEL -->
  <rect x="755" y="155" width="115" height="120" rx="12" fill="#ffffff" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="812" y="196" text-anchor="middle" font-size="36">🧠</text>
  <text x="812" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Tu modelo</text>
  <text x="812" y="240" text-anchor="middle" font-size="10" fill="#64748b">XGBoost</text>
  <text x="812" y="256" text-anchor="middle" font-size="10" fill="#64748b">predicciones</text>

  <!-- ============================================ -->
  <!-- SECTION: What is each one? -->
  <!-- ============================================ -->
  <rect x="40" y="375" width="395" height="320" rx="14" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="375" width="395" height="40" rx="14" fill="#059669"/>
  <rect x="40" y="401" width="395" height="14" fill="#059669"/>
  <text x="237" y="401" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Uvicorn: el servidor web</text>

  <text x="60" y="436" font-size="12" fill="#1e293b" font-weight="bold">Que es?</text>
  <text x="60" y="456" font-size="11" fill="#475569">Es un servidor web ASGI para Python. Su unico</text>
  <text x="60" y="472" font-size="11" fill="#475569">trabajo es escuchar peticiones de internet y</text>
  <text x="60" y="488" font-size="11" fill="#475569">pasarselas a tu aplicacion (FastAPI).</text>

  <text x="60" y="516" font-size="12" fill="#1e293b" font-weight="bold">Analogia</text>
  <text x="60" y="536" font-size="11" fill="#475569">Es como el mesero de un restaurante: no cocina,</text>
  <text x="60" y="552" font-size="11" fill="#475569">pero sin el, los platos no llegan a la mesa.</text>

  <text x="60" y="580" font-size="12" fill="#1e293b" font-weight="bold">Como se ejecuta?</text>
  <rect x="60" y="592" width="355" height="30" rx="6" fill="#1e1e2e"/>
  <text x="72" y="612" font-size="11" fill="#f9e2af" font-family="monospace">uvicorn app:app --host 0.0.0.0 --port 8000</text>

  <text x="68" y="640" font-size="10" fill="#64748b">       app:app</text>
  <text x="68" y="655" font-size="10" fill="#059669">         |    |</text>
  <text x="68" y="670" font-size="10" fill="#059669">  archivo  variable</text>
  <text x="68" y="685" font-size="10" fill="#059669">  app.py   app = FastAPI()</text>

  <!-- FASTAPI DETAIL -->
  <rect x="465" y="375" width="405" height="320" rx="14" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="465" y="375" width="405" height="40" rx="14" fill="#0891b2"/>
  <rect x="465" y="401" width="405" height="14" fill="#0891b2"/>
  <text x="667" y="401" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">FastAPI: el framework web</text>

  <text x="485" y="436" font-size="12" fill="#1e293b" font-weight="bold">Que es?</text>
  <text x="485" y="456" font-size="11" fill="#475569">Es un framework de Python para crear APIs web.</text>
  <text x="485" y="472" font-size="11" fill="#475569">Tu defines las rutas (URLs) y que hacer cuando</text>
  <text x="485" y="488" font-size="11" fill="#475569">alguien las visita. El se encarga del resto.</text>

  <text x="485" y="516" font-size="12" fill="#1e293b" font-weight="bold">Por que FastAPI y no Flask?</text>

  <rect x="485" y="528" width="365" height="24" rx="5" fill="#ecfeff"/>
  <text x="495" y="545" font-size="10" fill="#155e75">Mas rapido (asincrono por defecto)</text>
  <text x="835" y="545" text-anchor="end" font-size="12">⚡</text>

  <rect x="485" y="556" width="365" height="24" rx="5" fill="#ecfeff"/>
  <text x="495" y="573" font-size="10" fill="#155e75">Validacion automatica de datos con Pydantic</text>
  <text x="835" y="573" text-anchor="end" font-size="12">✅</text>

  <rect x="485" y="584" width="365" height="24" rx="5" fill="#ecfeff"/>
  <text x="495" y="601" font-size="10" fill="#155e75">Documentacion interactiva gratis (/docs)</text>
  <text x="835" y="601" text-anchor="end" font-size="12">📖</text>

  <rect x="485" y="612" width="365" height="24" rx="5" fill="#ecfeff"/>
  <text x="495" y="629" font-size="10" fill="#155e75">Tipado con Python type hints</text>
  <text x="835" y="629" text-anchor="end" font-size="12">🏷️</text>

  <rect x="485" y="640" width="365" height="24" rx="5" fill="#ecfeff"/>
  <text x="495" y="657" font-size="10" fill="#155e75">Excelente para APIs de ML en produccion</text>
  <text x="835" y="657" text-anchor="end" font-size="12">🧠</text>

  <text x="485" y="688" font-size="11" fill="#0891b2" font-style="italic">Flask es mas simple pero FastAPI es mas moderno</text>
  <text x="485" y="704" font-size="11" fill="#0891b2" font-style="italic">y mejor preparado para produccion.</text>
</svg>