<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="900" height="560" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Prediccion por lotes: como funciona por dentro</text>
  <text x="450" y="66" text-anchor="middle" font-size="14" fill="#64748b">El sistema automatizado de batch-deploy/ paso a paso</text>

  <!-- Analogy -->
  <rect x="100" y="80" width="700" height="38" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="450" y="104" text-anchor="middle" font-size="12" fill="#92400e">Analogia: Una fabrica que cada hora produce 1000 predicciones, las empaqueta y las guarda en bodega (base de datos)</text>

  <!-- STEP 1: Cron trigger -->
  <rect x="30" y="140" width="150" height="150" rx="12" fill="#ffffff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="55" cy="158" r="12" fill="#10B981"/>
  <text x="55" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">1</text>
  <text x="75" y="163" font-size="11" font-weight="bold" fill="#047857">Activador</text>
  <text x="105" y="210" text-anchor="middle" font-size="40">⏰</text>
  <text x="105" y="244" text-anchor="middle" font-size="10" fill="#047857" font-weight="600">Prefect Cron</text>
  <text x="105" y="260" text-anchor="middle" font-size="9" fill="#64748b">"Cada 2 horas,</text>
  <text x="105" y="272" text-anchor="middle" font-size="9" fill="#64748b">ejecuta el flujo"</text>

  <line x1="185" y1="215" x2="218" y2="215" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- STEP 2: Generate data -->
  <rect x="222" y="140" width="150" height="150" rx="12" fill="#ffffff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="247" cy="158" r="12" fill="#10B981"/>
  <text x="247" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">2</text>
  <text x="267" y="163" font-size="11" font-weight="bold" fill="#047857">Generar datos</text>
  <text x="297" y="210" text-anchor="middle" font-size="40">🎲</text>
  <text x="297" y="244" text-anchor="middle" font-size="10" fill="#047857" font-weight="600">data_generator.py</text>
  <text x="297" y="260" text-anchor="middle" font-size="9" fill="#64748b">1000 viajes sinteticos</text>
  <text x="297" y="272" text-anchor="middle" font-size="9" fill="#64748b">→ archivo .parquet</text>

  <line x1="377" y1="215" x2="410" y2="215" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- STEP 3: Predict -->
  <rect x="414" y="140" width="150" height="150" rx="12" fill="#ffffff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="439" cy="158" r="12" fill="#10B981"/>
  <text x="439" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">3</text>
  <text x="459" y="163" font-size="11" font-weight="bold" fill="#047857">Predecir</text>
  <text x="489" y="210" text-anchor="middle" font-size="40">🧠</text>
  <text x="489" y="244" text-anchor="middle" font-size="10" fill="#047857" font-weight="600">batch_predictor.py</text>
  <text x="489" y="260" text-anchor="middle" font-size="9" fill="#64748b">XGBoost procesa</text>
  <text x="489" y="272" text-anchor="middle" font-size="9" fill="#64748b">los 1000 viajes</text>

  <line x1="569" y1="215" x2="602" y2="215" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- STEP 4: Save to DB -->
  <rect x="606" y="140" width="150" height="150" rx="12" fill="#ffffff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="631" cy="158" r="12" fill="#10B981"/>
  <text x="631" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">4</text>
  <text x="651" y="163" font-size="11" font-weight="bold" fill="#047857">Guardar</text>
  <text x="681" y="210" text-anchor="middle" font-size="40">🗄️</text>
  <text x="681" y="244" text-anchor="middle" font-size="10" fill="#047857" font-weight="600">database.py</text>
  <text x="681" y="260" text-anchor="middle" font-size="9" fill="#64748b">Resultados →</text>
  <text x="681" y="272" text-anchor="middle" font-size="9" fill="#64748b">SQLite (predictions.db)</text>

  <!-- STEP 5: Monitor -->
  <line x1="761" y1="215" x2="773" y2="215" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>

  <rect x="777" y="140" width="100" height="150" rx="12" fill="#ffffff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="802" cy="158" r="12" fill="#10B981"/>
  <text x="802" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">5</text>
  <text x="827" y="160" text-anchor="middle" font-size="24">📈</text>
  <text x="827" y="210" text-anchor="middle" font-size="30">📋</text>
  <text x="827" y="244" text-anchor="middle" font-size="9" fill="#047857" font-weight="600">Artefactos</text>
  <text x="827" y="258" text-anchor="middle" font-size="9" fill="#047857" font-weight="600">Prefect</text>
  <text x="827" y="280" text-anchor="middle" font-size="8" fill="#64748b">Monitoreo</text>

  <!-- Repeat arrow -->
  <rect x="320" y="305" width="260" height="34" rx="8" fill="#10B981"/>
  <text x="450" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">🔄 Se repite automaticamente cada 2 horas</text>

  <!-- Database detail -->
  <rect x="30" y="360" width="840" height="185" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="390" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Que se guarda en la base de datos? (tabla predictions)</text>

  <!-- Table header -->
  <rect x="55" y="408" width="790" height="32" rx="6" fill="#10B981"/>
  <text x="105" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">PULocationID</text>
  <text x="215" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">DOLocationID</text>
  <text x="325" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">trip_distance</text>
  <text x="445" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">predicted_min</text>
  <text x="560" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">model_name</text>
  <text x="675" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">batch_id</text>
  <text x="785" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">timestamp</text>

  <!-- Row 1 -->
  <rect x="55" y="442" width="790" height="28" rx="0" fill="#f0fdf4"/>
  <text x="105" y="461" text-anchor="middle" font-size="10" fill="#1e293b">161</text>
  <text x="215" y="461" text-anchor="middle" font-size="10" fill="#1e293b">236</text>
  <text x="325" y="461" text-anchor="middle" font-size="10" fill="#1e293b">2.5</text>
  <text x="445" y="461" text-anchor="middle" font-size="10" fill="#047857" font-weight="bold">12.5</text>
  <text x="560" y="461" text-anchor="middle" font-size="10" fill="#1e293b">xgboost_v3</text>
  <text x="675" y="461" text-anchor="middle" font-size="10" fill="#1e293b">batch_001</text>
  <text x="785" y="461" text-anchor="middle" font-size="10" fill="#1e293b">2024-03-15</text>

  <!-- Row 2 -->
  <rect x="55" y="472" width="790" height="28" rx="0" fill="#ffffff"/>
  <text x="105" y="491" text-anchor="middle" font-size="10" fill="#1e293b">237</text>
  <text x="215" y="491" text-anchor="middle" font-size="10" fill="#1e293b">170</text>
  <text x="325" y="491" text-anchor="middle" font-size="10" fill="#1e293b">5.1</text>
  <text x="445" y="491" text-anchor="middle" font-size="10" fill="#047857" font-weight="bold">18.3</text>
  <text x="560" y="491" text-anchor="middle" font-size="10" fill="#1e293b">xgboost_v3</text>
  <text x="675" y="491" text-anchor="middle" font-size="10" fill="#1e293b">batch_001</text>
  <text x="785" y="491" text-anchor="middle" font-size="10" fill="#1e293b">2024-03-15</text>

  <!-- Row 3 -->
  <rect x="55" y="502" width="790" height="28" rx="0" fill="#f0fdf4"/>
  <text x="105" y="521" text-anchor="middle" font-size="10" fill="#64748b">...</text>
  <text x="215" y="521" text-anchor="middle" font-size="10" fill="#64748b">...</text>
  <text x="325" y="521" text-anchor="middle" font-size="10" fill="#64748b">...</text>
  <text x="445" y="521" text-anchor="middle" font-size="10" fill="#64748b">...</text>
  <text x="560" y="521" text-anchor="middle" font-size="10" fill="#64748b">...</text>
  <text x="675" y="521" text-anchor="middle" font-size="10" fill="#64748b">...</text>
  <text x="785" y="521" text-anchor="middle" font-size="10" fill="#64748b">...</text>
  <text x="450" y="542" text-anchor="middle" font-size="10" fill="#10B981" font-weight="bold">1000 filas por batch</text>
</svg>