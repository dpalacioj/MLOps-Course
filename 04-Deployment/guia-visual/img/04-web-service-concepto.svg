<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#f3e8ff"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="900" height="620" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Como funciona una API de prediccion</text>
  <text x="450" y="66" text-anchor="middle" font-size="14" fill="#64748b">Tu modelo ML como un servicio que cualquiera puede usar</text>

  <!-- Analogy bar -->
  <rect x="100" y="82" width="700" height="38" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="450" y="106" text-anchor="middle" font-size="13" fill="#92400e">Analogia: Es como un restaurante. El cliente pide un plato (datos), la cocina lo prepara (modelo), y devuelve el resultado (prediccion).</text>

  <!-- === Main flow === -->

  <!-- Client -->
  <rect x="40" y="150" width="200" height="260" rx="14" fill="#ffffff" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="150" width="200" height="40" rx="14" fill="#6366F1"/>
  <rect x="40" y="176" width="200" height="14" fill="#6366F1"/>
  <text x="140" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Cliente (quien pide)</text>

  <text x="140" y="220" text-anchor="middle" font-size="40">👤</text>

  <text x="140" y="254" text-anchor="middle" font-size="11" fill="#64748b">Puede ser:</text>
  <rect x="60" y="264" width="160" height="24" rx="5" fill="#EEF2FF"/>
  <text x="140" y="281" text-anchor="middle" font-size="10" fill="#4338ca">Una pagina web</text>
  <rect x="60" y="293" width="160" height="24" rx="5" fill="#EEF2FF"/>
  <text x="140" y="310" text-anchor="middle" font-size="10" fill="#4338ca">Una app movil</text>
  <rect x="60" y="322" width="160" height="24" rx="5" fill="#EEF2FF"/>
  <text x="140" y="339" text-anchor="middle" font-size="10" fill="#4338ca">Otro programa (Postman, curl)</text>
  <rect x="60" y="351" width="160" height="24" rx="5" fill="#EEF2FF"/>
  <text x="140" y="368" text-anchor="middle" font-size="10" fill="#4338ca">Un script de Python</text>

  <!-- Request Arrow -->
  <line x1="245" y1="240" x2="320" y2="240" stroke="#8B5CF6" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <rect x="248" y="215" width="70" height="18" rx="4" fill="#8B5CF6"/>
  <text x="283" y="228" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="bold">PETICION</text>

  <!-- Request data box -->
  <rect x="252" y="248" width="66" height="52" rx="4" fill="#1e1e2e"/>
  <text x="258" y="262" font-size="8" fill="#a6e3a1" font-family="monospace">pickup: 161</text>
  <text x="258" y="274" font-size="8" fill="#a6e3a1" font-family="monospace">dropoff: 236</text>
  <text x="258" y="286" font-size="8" fill="#a6e3a1" font-family="monospace">dist: 2.5</text>

  <!-- API Server -->
  <rect x="325" y="150" width="250" height="260" rx="14" fill="#ffffff" stroke="#8B5CF6" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="325" y="150" width="250" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="325" y="176" width="250" height="14" fill="#8B5CF6"/>
  <text x="450" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">API (el servidor / cocina)</text>

  <text x="450" y="218" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">FastAPI recibe los datos</text>
  <text x="450" y="238" text-anchor="middle" font-size="24">📥</text>

  <!-- Processing steps inside API -->
  <rect x="345" y="250" width="210" height="28" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="355" y="269" font-size="11" fill="#5b21b6">1. Valida los datos (Pydantic)</text>

  <text x="450" y="290" text-anchor="middle" font-size="12" fill="#94a3b8">▼</text>

  <rect x="345" y="296" width="210" height="28" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="355" y="315" font-size="11" fill="#5b21b6">2. Prepara features (DictVect)</text>

  <text x="450" y="336" text-anchor="middle" font-size="12" fill="#94a3b8">▼</text>

  <rect x="345" y="342" width="210" height="28" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="355" y="361" font-size="11" fill="#5b21b6">3. Modelo predice (XGBoost)</text>

  <text x="450" y="395" text-anchor="middle" font-size="24">🧠</text>

  <!-- Response Arrow -->
  <line x1="320" y1="345" x2="245" y2="345" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrowL)"/>
  <rect x="248" y="330" width="70" height="18" rx="4" fill="#10B981"/>
  <text x="283" y="343" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="bold">RESPUESTA</text>

  <!-- Response data box -->
  <rect x="248" y="352" width="70" height="40" rx="4" fill="#1e1e2e"/>
  <text x="254" y="366" font-size="8" fill="#a6e3a1" font-family="monospace">duracion:</text>
  <text x="254" y="380" font-size="8" fill="#f9e2af" font-family="monospace">12.5 min</text>

  <!-- Model detail -->
  <rect x="620" y="150" width="250" height="260" rx="14" fill="#ffffff" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="620" y="150" width="250" height="40" rx="14" fill="#F59E0B"/>
  <rect x="620" y="176" width="250" height="14" fill="#F59E0B"/>
  <text x="745" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Modelo ML (el chef)</text>

  <text x="745" y="218" text-anchor="middle" font-size="40">🧠</text>

  <text x="745" y="254" text-anchor="middle" font-size="11" fill="#64748b">Entrenado previamente con</text>
  <text x="745" y="270" text-anchor="middle" font-size="11" fill="#64748b">datos historicos de taxis NYC</text>

  <rect x="640" y="288" width="210" height="24" rx="5" fill="#FFFBEB"/>
  <text x="745" y="305" text-anchor="middle" font-size="10" fill="#92400e">XGBoost + DictVectorizer</text>

  <rect x="640" y="318" width="210" height="24" rx="5" fill="#FFFBEB"/>
  <text x="745" y="335" text-anchor="middle" font-size="10" fill="#92400e">Guardado con MLflow</text>

  <rect x="640" y="348" width="210" height="24" rx="5" fill="#FFFBEB"/>
  <text x="745" y="365" text-anchor="middle" font-size="10" fill="#92400e">Cargado al iniciar el servidor</text>

  <text x="745" y="400" text-anchor="middle" font-size="11" fill="#F59E0B" font-style="italic">El modelo vive dentro de la API</text>

  <!-- Arrow API to Model -->
  <line x1="580" y1="290" x2="615" y2="290" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Bottom: Endpoints -->
  <rect x="40" y="435" width="820" height="170" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="462" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Endpoints disponibles (las "puertas" de la API)</text>

  <!-- Endpoint cards -->
  <rect x="60" y="480" width="150" height="105" rx="10" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="135" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#047857">GET /</text>
  <text x="135" y="520" text-anchor="middle" font-size="22">🖥️</text>
  <text x="135" y="542" text-anchor="middle" font-size="10" fill="#64748b">Interfaz web</text>
  <text x="135" y="556" text-anchor="middle" font-size="10" fill="#64748b">interactiva</text>
  <text x="135" y="576" text-anchor="middle" font-size="9" fill="#10B981">Formulario visual</text>

  <rect x="230" y="480" width="150" height="105" rx="10" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="305" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d28d9">POST /predict</text>
  <text x="305" y="520" text-anchor="middle" font-size="22">🔮</text>
  <text x="305" y="542" text-anchor="middle" font-size="10" fill="#64748b">Prediccion</text>
  <text x="305" y="556" text-anchor="middle" font-size="10" fill="#64748b">individual</text>
  <text x="305" y="576" text-anchor="middle" font-size="9" fill="#8B5CF6">1 viaje a la vez</text>

  <rect x="400" y="480" width="150" height="105" rx="10" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="475" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d28d9">POST /predict/batch</text>
  <text x="475" y="520" text-anchor="middle" font-size="22">📦</text>
  <text x="475" y="542" text-anchor="middle" font-size="10" fill="#64748b">Prediccion</text>
  <text x="475" y="556" text-anchor="middle" font-size="10" fill="#64748b">por lotes</text>
  <text x="475" y="576" text-anchor="middle" font-size="9" fill="#8B5CF6">Hasta 1000 viajes</text>

  <rect x="570" y="480" width="150" height="105" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="645" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">GET /health</text>
  <text x="645" y="520" text-anchor="middle" font-size="22">💚</text>
  <text x="645" y="542" text-anchor="middle" font-size="10" fill="#64748b">Verificar que</text>
  <text x="645" y="556" text-anchor="middle" font-size="10" fill="#64748b">el servidor esta vivo</text>
  <text x="645" y="576" text-anchor="middle" font-size="9" fill="#3B82F6">Monitoreo basico</text>

  <rect x="740" y="480" width="100" height="105" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="790" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">GET /docs</text>
  <text x="790" y="520" text-anchor="middle" font-size="22">📖</text>
  <text x="790" y="542" text-anchor="middle" font-size="10" fill="#64748b">Documentacion</text>
  <text x="790" y="556" text-anchor="middle" font-size="10" fill="#64748b">automatica</text>
  <text x="790" y="576" text-anchor="middle" font-size="9" fill="#F59E0B">Swagger UI</text>
</svg>