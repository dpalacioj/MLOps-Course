<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <rect width="900" height="650" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Docker explicado con una analogia</text>
  <text x="450" y="66" text-anchor="middle" font-size="14" fill="#64748b">Piensa en Docker como un sistema de envio de paquetes</text>

  <!-- Analogy: Recipe = Dockerfile -->
  <rect x="40" y="95" width="260" height="240" rx="14" fill="#ffffff" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="95" width="260" height="40" rx="14" fill="#3B82F6"/>
  <rect x="40" y="121" width="260" height="14" fill="#3B82F6"/>
  <text x="170" y="121" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Dockerfile = Receta</text>

  <text x="170" y="168" text-anchor="middle" font-size="48">📝</text>

  <text x="170" y="204" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="600">Instrucciones paso a paso:</text>
  <text x="80" y="226" font-size="11" fill="#475569">1. Usa Python 3.11</text>
  <text x="80" y="244" font-size="11" fill="#475569">2. Instala FastAPI y XGBoost</text>
  <text x="80" y="262" font-size="11" fill="#475569">3. Copia mi codigo</text>
  <text x="80" y="280" font-size="11" fill="#475569">4. Copia mi modelo ML</text>
  <text x="80" y="298" font-size="11" fill="#475569">5. Ejecuta el servidor</text>

  <text x="170" y="326" text-anchor="middle" font-size="11" fill="#3B82F6" font-style="italic">Como una receta de cocina:</text>
  <text x="170" y="340" text-anchor="middle" font-size="11" fill="#3B82F6" font-style="italic">lista exacta de ingredientes y pasos</text>

  <!-- Arrow 1 -->
  <text x="325" y="200" text-anchor="middle" font-size="14" fill="#64748b" font-weight="bold">docker</text>
  <text x="325" y="218" text-anchor="middle" font-size="14" fill="#64748b" font-weight="bold">build</text>
  <text x="325" y="238" text-anchor="middle" font-size="24">➡️</text>

  <!-- Analogy: Image = Plato preparado / Paquete sellado -->
  <rect x="365" y="95" width="230" height="240" rx="14" fill="#ffffff" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="365" y="95" width="230" height="40" rx="14" fill="#8B5CF6"/>
  <rect x="365" y="121" width="230" height="14" fill="#8B5CF6"/>
  <text x="480" y="121" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Imagen = Paquete Sellado</text>

  <text x="480" y="168" text-anchor="middle" font-size="48">📦</text>

  <text x="480" y="204" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="600">Contiene TODO lo necesario:</text>

  <rect x="390" y="216" width="180" height="22" rx="5" fill="#f5f3ff"/>
  <text x="400" y="232" font-size="11" fill="#5b21b6">Python 3.11 ✓</text>
  <rect x="390" y="242" width="180" height="22" rx="5" fill="#f5f3ff"/>
  <text x="400" y="258" font-size="11" fill="#5b21b6">Librerias ✓</text>
  <rect x="390" y="268" width="180" height="22" rx="5" fill="#f5f3ff"/>
  <text x="400" y="284" font-size="11" fill="#5b21b6">Tu codigo ✓</text>
  <rect x="390" y="294" width="180" height="22" rx="5" fill="#f5f3ff"/>
  <text x="400" y="310" font-size="11" fill="#5b21b6">Modelo ML ✓</text>

  <text x="480" y="340" text-anchor="middle" font-size="11" fill="#8B5CF6" font-style="italic">Inmutable: siempre identico,</text>
  <text x="480" y="354" text-anchor="middle" font-size="11" fill="#8B5CF6" font-style="italic">puedes copiarlo mil veces</text>

  <!-- Arrow 2 -->
  <text x="618" y="200" text-anchor="middle" font-size="14" fill="#64748b" font-weight="bold">docker</text>
  <text x="618" y="218" text-anchor="middle" font-size="14" fill="#64748b" font-weight="bold">run</text>
  <text x="618" y="238" text-anchor="middle" font-size="24">➡️</text>

  <!-- Analogy: Container = Paquete abierto funcionando -->
  <rect x="650" y="95" width="220" height="240" rx="14" fill="#ffffff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="650" y="95" width="220" height="40" rx="14" fill="#10B981"/>
  <rect x="650" y="121" width="220" height="14" fill="#10B981"/>
  <text x="760" y="121" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Contenedor = App Viva</text>

  <text x="760" y="168" text-anchor="middle" font-size="48">🚀</text>

  <text x="760" y="204" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="600">Tu app ejecutandose:</text>

  <rect x="670" y="218" width="180" height="30" rx="6" fill="#ecfdf5" stroke="#10B981" stroke-width="1"/>
  <text x="760" y="238" text-anchor="middle" font-size="11" fill="#065f46">Servidor activo en :8000</text>

  <rect x="670" y="254" width="180" height="30" rx="6" fill="#ecfdf5" stroke="#10B981" stroke-width="1"/>
  <text x="760" y="274" text-anchor="middle" font-size="11" fill="#065f46">Recibiendo peticiones</text>

  <rect x="670" y="290" width="180" height="30" rx="6" fill="#ecfdf5" stroke="#10B981" stroke-width="1"/>
  <text x="760" y="310" text-anchor="middle" font-size="11" fill="#065f46">Aislado del resto</text>

  <text x="760" y="346" text-anchor="middle" font-size="11" fill="#10B981" font-style="italic">Puedes tener varios</text>
  <text x="760" y="360" text-anchor="middle" font-size="11" fill="#10B981" font-style="italic">contenedores del mismo paquete</text>

  <!-- Bottom: Real world analogy -->
  <rect x="40" y="370" width="820" height="260" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="400" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Analogia del mundo real: Enviar comida a domicilio</text>

  <!-- Analogy row -->
  <!-- Recipe -->
  <rect x="70" y="420" width="230" height="90" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="185" y="448" text-anchor="middle" font-size="28">👨‍🍳📝</text>
  <text x="185" y="474" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">RECETA (Dockerfile)</text>
  <text x="185" y="492" text-anchor="middle" font-size="11" fill="#64748b">Instrucciones del chef para</text>
  <text x="185" y="505" text-anchor="middle" font-size="11" fill="#64748b">preparar un plato especifico</text>

  <!-- Packaged meal -->
  <rect x="335" y="420" width="230" height="90" rx="10" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="450" y="448" text-anchor="middle" font-size="28">🍱📦</text>
  <text x="450" y="474" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">PAQUETE (Imagen)</text>
  <text x="450" y="492" text-anchor="middle" font-size="11" fill="#64748b">Comida preparada y empacada,</text>
  <text x="450" y="505" text-anchor="middle" font-size="11" fill="#64748b">lista para enviar a cualquier lugar</text>

  <!-- Delivered and served -->
  <rect x="600" y="420" width="230" height="90" rx="10" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="715" y="448" text-anchor="middle" font-size="28">🍽️✨</text>
  <text x="715" y="474" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">SERVIDO (Contenedor)</text>
  <text x="715" y="492" text-anchor="middle" font-size="11" fill="#64748b">El plato abierto y listo para</text>
  <text x="715" y="505" text-anchor="middle" font-size="11" fill="#64748b">comer, sin importar donde estes</text>

  <!-- Key insight -->
  <rect x="120" y="540" width="660" height="70" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="450" y="568" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Idea clave:</text>
  <text x="450" y="590" text-anchor="middle" font-size="13" fill="#78350f">No importa si la comida se entrega en Bogota, Madrid o Tokio,</text>
  <text x="450" y="606" text-anchor="middle" font-size="13" fill="#78350f">el plato siempre sabe igual. Docker hace lo mismo con tu app.</text>
</svg>