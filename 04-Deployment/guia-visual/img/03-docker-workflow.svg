<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="900" height="580" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Flujo de trabajo con Docker: del codigo al contenedor</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748b">Los 3 comandos esenciales que necesitas conocer</text>

  <!-- STEP 1: Write Dockerfile -->
  <rect x="30" y="95" width="260" height="190" rx="14" fill="#ffffff" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="56" cy="116" r="14" fill="#6366F1"/>
  <text x="56" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">1</text>
  <text x="78" y="121" font-size="14" font-weight="bold" fill="#1e293b">Escribir el Dockerfile</text>

  <!-- Code block -->
  <rect x="48" y="140" width="224" height="130" rx="8" fill="#1e1e2e"/>
  <text x="60" y="162" font-size="11" fill="#89b4fa" font-family="monospace">FROM</text>
  <text x="100" y="162" font-size="11" fill="#a6e3a1" font-family="monospace">python:3.11-slim</text>
  <text x="60" y="180" font-size="11" fill="#89b4fa" font-family="monospace">WORKDIR</text>
  <text x="120" y="180" font-size="11" fill="#a6e3a1" font-family="monospace">/app</text>
  <text x="60" y="198" font-size="11" fill="#89b4fa" font-family="monospace">COPY</text>
  <text x="100" y="198" font-size="11" fill="#a6e3a1" font-family="monospace">requirements.txt .</text>
  <text x="60" y="216" font-size="11" fill="#89b4fa" font-family="monospace">RUN</text>
  <text x="92" y="216" font-size="11" fill="#a6e3a1" font-family="monospace">pip install -r ...</text>
  <text x="60" y="234" font-size="11" fill="#89b4fa" font-family="monospace">COPY</text>
  <text x="100" y="234" font-size="11" fill="#a6e3a1" font-family="monospace">app.py .</text>
  <text x="60" y="252" font-size="11" fill="#89b4fa" font-family="monospace">CMD</text>
  <text x="92" y="252" font-size="11" fill="#a6e3a1" font-family="monospace">["uvicorn","app:app"]</text>

  <!-- Arrow 1→2 -->
  <line x1="295" y1="190" x2="332" y2="190" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- STEP 2: Build -->
  <rect x="340" y="95" width="220" height="190" rx="14" fill="#ffffff" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="366" cy="116" r="14" fill="#3B82F6"/>
  <text x="366" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">2</text>
  <text x="388" y="121" font-size="14" font-weight="bold" fill="#1e293b">Construir imagen</text>

  <rect x="358" y="142" width="184" height="32" rx="6" fill="#1e1e2e"/>
  <text x="366" y="163" font-size="11" fill="#f9e2af" font-family="monospace">$ docker build -t mi-app .</text>

  <text x="450" y="200" text-anchor="middle" font-size="36">🏗️</text>

  <text x="450" y="235" text-anchor="middle" font-size="11" fill="#64748b">Docker lee el Dockerfile,</text>
  <text x="450" y="250" text-anchor="middle" font-size="11" fill="#64748b">descarga Python, instala</text>
  <text x="450" y="265" text-anchor="middle" font-size="11" fill="#64748b">librerias y empaqueta todo</text>

  <!-- Arrow 2→3 -->
  <line x1="565" y1="190" x2="602" y2="190" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- STEP 3: Run -->
  <rect x="610" y="95" width="260" height="190" rx="14" fill="#ffffff" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="636" cy="116" r="14" fill="#10B981"/>
  <text x="636" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">3</text>
  <text x="658" y="121" font-size="14" font-weight="bold" fill="#1e293b">Ejecutar contenedor</text>

  <rect x="628" y="142" width="224" height="32" rx="6" fill="#1e1e2e"/>
  <text x="636" y="163" font-size="10" fill="#f9e2af" font-family="monospace">$ docker run -p 8000:8000 mi-app</text>

  <text x="740" y="200" text-anchor="middle" font-size="36">🚀</text>

  <text x="740" y="235" text-anchor="middle" font-size="11" fill="#64748b">Tu app esta corriendo</text>
  <text x="740" y="250" text-anchor="middle" font-size="11" fill="#64748b">y accesible en</text>
  <text x="740" y="268" text-anchor="middle" font-size="13" fill="#10B981" font-weight="bold">localhost:8000</text>

  <!-- Port mapping explanation -->
  <rect x="30" y="310" width="840" height="120" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="340" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Que significa -p 8000:8000? (Mapeo de puertos)</text>

  <!-- Your machine -->
  <rect x="80" y="360" width="280" height="50" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="120" y="382" font-size="24">💻</text>
  <text x="155" y="380" font-size="13" font-weight="600" fill="#1e40af">Tu computador</text>
  <text x="155" y="398" font-size="12" fill="#3B82F6">Puerto 8000 (la "puerta de entrada")</text>

  <!-- Connection -->
  <line x1="365" y1="385" x2="490" y2="385" stroke="#F59E0B" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="428" y="377" text-anchor="middle" font-size="18">🔗</text>

  <!-- Container -->
  <rect x="495" y="360" width="330" height="50" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="535" y="382" font-size="24">📦</text>
  <text x="570" y="380" font-size="13" font-weight="600" fill="#047857">Contenedor Docker</text>
  <text x="570" y="398" font-size="12" fill="#10B981">Puerto 8000 (donde corre la app internamente)</text>

  <!-- Bottom: Common commands -->
  <rect x="30" y="450" width="840" height="115" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="478" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Comandos utiles del dia a dia</text>

  <!-- Command cards -->
  <rect x="50" y="494" width="185" height="54" rx="8" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="142" y="514" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold" font-family="monospace">docker ps</text>
  <text x="142" y="534" text-anchor="middle" font-size="10" fill="#64748b">Ver contenedores activos</text>

  <rect x="250" y="494" width="185" height="54" rx="8" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="342" y="514" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold" font-family="monospace">docker logs mi-app</text>
  <text x="342" y="534" text-anchor="middle" font-size="10" fill="#64748b">Ver que imprime la app</text>

  <rect x="450" y="494" width="185" height="54" rx="8" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="542" y="514" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold" font-family="monospace">docker stop mi-app</text>
  <text x="542" y="534" text-anchor="middle" font-size="10" fill="#64748b">Detener el contenedor</text>

  <rect x="650" y="494" width="185" height="54" rx="8" fill="#F0F4FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="742" y="514" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold" font-family="monospace">docker images</text>
  <text x="742" y="534" text-anchor="middle" font-size="10" fill="#64748b">Ver imagenes creadas</text>
</svg>